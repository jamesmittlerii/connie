# Vendored trees are not maintained in this repo.
sonar.exclusions=lv2/include/**,external/**

# Headers under lv2/include are #included by connie_lv2.c; Sonar still analyzes them
# unless ignored explicitly (sonar.exclusions does not apply to included headers).
sonar.issue.ignore.multicriteria=lv2vendor
sonar.issue.ignore.multicriteria.lv2vendor.ruleKey=*
sonar.issue.ignore.multicriteria.lv2vendor.resourceKey=lv2/include/**

# Help the scanner find the LV2 headers
sonar.c.includeDirectories=lv2/include
sonar.cxx.includeDirectories=lv2/include
